<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Task Manager</title>
  <link rel="stylesheet" href="/style/app.css" />
</head>
<body>
  <header>
    <button id="toggleDark">Dark Mode</button>
    <h1>My Tasks</h1>
    <p>A simple task manager application</p>
  </header>
  <main>
    <section class="card">
      <h2>New Task</h2>
      <form id="taskForm">
        <label>Priority
<select id="selPriority">
<option value="Low">Low</option>
<option value="Medium">Medium</option>
<option value="High">High</option>
</select>
</label>
        <div class="form-grid">
          <label>Title <input id="txtTitle" required placeholder="Pay the bills" /></label>
          <label>Description <input id="txtDescription" placeholder="Electricity and water" /></label>
          <label>Color <input id="selColor" type="color" value="#ffcc00" /></label>
          <label>Date <input id="selDate" type="date" /></label>
          <label>Status
            <select id="selStatus">
              <option value="New">New</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </label>
          <label>Budget <input id="numBudget" type="number" step="0.01" placeholder="100.00" /></label>
        </div>
        <button type="button" id="btnSave">Save Task</button>
      </form>
    </section>
    <section class="card">
      <div class="stats">

<div class="stat-card">
<h3 id="statTotal">0</h3>
<p>Total Tasks</p>
</div>

<div class="stat-card">
<h3 id="statNew">0</h3>
<p>New</p>
</div>

<div class="stat-card">
<h3 id="statProgress">0</h3>
<p>In Progress</p>
</div>

<div class="stat-card">
<h3 id="statDone">0</h3>
<p>Completed</p>
</div>

</div>
      <h2>Task List</h2>
 <div class="task-toolbar">

<input 
type="text" 
id="searchBox" 
placeholder="Search tasks..." 
class="search-input"
/>

<span id="taskCount">0 Tasks</span>

<button id="btnDeleteAll">Delete All Tasks</button>

</div>
</div>
      <table class="task-table">
    <thead>
        <tr>
            <th>Color</th>
            <th>Title</th>
            <th>Description</th>
            <th>Date</th>
            <th>Status</th>
            <th>Budget</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="list"></tbody>
    
</table>
<button id="btnDeleteAll">Delete All Tasks</button>
    </section>
    <section class="board">

<div class="column" id="colNew">
<h3>New</h3>
</div>

<div class="column" id="colProgress">
<h3>In Progress</h3>
</div>

<div class="column" id="colDone">
<h3>Completed</h3>
</div>

</section>
<section class="card">

<h2>Task Calendar</h2>

<input type="date" id="calendarDate">

<ul id="calendarTasks"></ul>

</section>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="/scripts/task.js"></script>
  <script src="/scripts/app.js"></script>
</body>
</html>
